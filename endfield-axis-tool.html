<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="referrer" content="no-referrer">
<!-- 性能优化：预连接图片服务器 -->
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://cdnimg-v2.gamekee.com">
<title>终末地排轴工具</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
:root {
--bg-color: #121212;
--card-bg: #1e1e1e;
--sidebar-bg: #1a1a1a;
--endfield-cyan: #00E5FF;
--endfield-gold: #DEA701;
--text-color: #ffffff;
--input-bg: #161616;
--border-color: #333;
--sidebar-width: 320px;
}
/* 滚动条样式优化 */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 10px; }
::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--endfield-cyan); }
body {
    background-color: var(--bg-color);
    color: var(--text-color);
    font-family: "Microsoft YaHei", "SimHei", sans-serif;
    margin: 0;
    padding: 20px 20px 150px 20px; 
    overflow-x: hidden;
    scroll-behavior: smooth;
    background-attachment: fixed;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

.container { width: 95%; max-width: 1400px; margin: 0 auto; position: relative;}

/* Wiki信息展示区 - 优化：增加标题同款颜色和阴影 */
.wiki-info { 
    margin-top: 10px; 
    color: var(--text-color); 
    font-size: 13px; 
    line-height: 1.6; 
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
    font-weight: bold;
}
.wiki-info p { margin: 2px 0; }
.wiki-info a { color: var(--endfield-cyan); text-decoration: none; }
.wiki-info a:hover { text-decoration: underline; }
.qq-highlight { color: var(--endfield-cyan); }

/* 左侧目录样式 */
#toc-container {
    position: fixed; left: 20px; top: 100px; width: 140px;
    background: var(--sidebar-bg); border: 1px solid var(--border-color);
    border-radius: 8px; padding: 15px; z-index: 1000;
    max-height: 70vh; overflow-y: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.toc-header { font-size: 14px; font-weight: bold; color: var(--endfield-cyan); margin-bottom: 10px; border-bottom: 1px solid #444; padding-bottom: 5px; }
.toc-item { cursor: pointer; padding: 6px 8px; font-size: 13px; color: #aaa; border-radius: 4px; transition: 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-left: 3px solid transparent; }
.toc-item:hover { background: rgba(0, 229, 255, 0.1); color: var(--endfield-cyan); }

/* 快速跳转选中状态样式 */
.toc-item.active {
    background: rgba(0, 229, 255, 0.15);
    color: var(--endfield-cyan);
    border-left: 3px solid var(--endfield-cyan);
    font-weight: bold;
}

.header-bar { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; flex-wrap: wrap; gap:20px;}
h1 { color: var(--text-color); font-size: clamp(24px, 5vw, 32px); font-weight: bold; border-left: 4px solid var(--endfield-cyan); padding-left: 15px; margin: 0; line-height: 1.1; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }

.btn-full-width { width: 100%; background-color: transparent; font-weight: bold; border-radius: 4px; cursor: pointer; transition: all 0.2s; box-sizing: border-box; }
.insert-btn { height: 36px; color: #fff; border: 1px solid #666; margin-top: 15px; font-size: 13px; }
.insert-btn:hover { border-color: #999; background: rgba(255,255,255,0.05); }

/* 底部新建按钮 - 优化：改为填充样式提高辨识度 */
.create-btn-bottom { 
    height: 48px; 
    color: #000; 
    background-color: var(--endfield-cyan);
    border: none; 
    margin-top: 40px; 
    font-size: 16px; 
    letter-spacing: 2px; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
}
.create-btn-bottom:hover { 
    background-color: #00B8CC;
    transform: translateY(-2px);
}

/* 轴组件 - 优化：增加阴影与背景区分 */
.axis-container { 
    background: rgba(30, 30, 30, 0.95); 
    margin-top: 30px; 
    padding: 25px; 
    border-radius: 12px; 
    border: 1px solid var(--border-color); 
    position: relative; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.05);
}
.axis-header { display: flex; align-items: center; margin-bottom: 20px; gap: 10px; flex-wrap: wrap;}
.axis-title { font-size: 1.2rem; font-weight: bold; background: none; border: none; border-bottom: 2px solid #444; color: var(--text-color); padding: 5px 0; width: auto; min-width: 100px; max-width: 600px; outline: none; }
.axis-title:focus { border-bottom-color: var(--endfield-cyan); }

.skills-list { display: flex; flex-wrap: wrap; align-items: flex-start; gap: 0px; min-height: 140px; }
.skill-slot { display: flex; flex-direction: column; width: 145px; cursor: grab; margin-bottom: 5px; }
.skill-node { display: flex; flex-direction: column; align-items: flex-start; width: 100%; height: 100%; }

.skill-main-row { display: flex; align-items: center; width: 100%; position: relative; justify-content: flex-start; min-height: 300px; flex: none; } 

.parallel-wrapper { display: flex; flex-direction: column; gap: 8px; align-items: center; position: relative; width: 120px; }
.parallel-or-divider { font-size: 12px; color: #666; font-weight: bold; margin: -4px 0; user-select: none; }

.skill-card { position: relative; width: 120px; text-align: center; border: 2px solid transparent; border-radius: 10px; padding: 5px; transition: 0.3s; background: rgba(255,255,255,0.02); box-sizing: border-box;}
.skill-card.selected { border-color: var(--endfield-cyan); background: rgba(0, 229, 255, 0.1); }

.skill-icon-btn { position: absolute; width: 19px; height: 19px; z-index: 20; cursor: pointer; display: flex; align-items: center; justify-content: center; background: #262626; border: 1px solid #555; border-radius: 50%; font-weight: bold; transition: all 0.2s; padding: 0; margin: 0; right: 2px; }
.skill-remark-icon { top: 2px; font-size: 14px; color: var(--endfield-cyan); line-height: 1; }
.skill-remark-icon.has-content { color: #FFEB3B; border-color: #FFEB3B; }
.skill-split-icon { bottom: 5px; color: #aaa; font-size: 10px; }
.skill-split-icon:hover { color: var(--endfield-cyan); border-color: var(--endfield-cyan); }
.parallel-wrapper.dual .skill-split-icon { display: none !important; }

.skill-note-preview { display: none; width: 120px; font-size: 11px; color: #ddd; background: rgba(0,0,0,0.4); padding: 4px 6px; border-radius: 4px; margin-top: 5px; border: none; border-left: 2px solid var(--endfield-cyan); text-align: center; font-family: inherit; overflow: hidden; box-sizing: border-box; outline: none; word-break: break-all; }
.axis-container.preview-active .skill-note-preview.has-data { display: block; }

#skill-note-popover { position: fixed; z-index: 3000; background: #222; border: 1px solid var(--endfield-cyan); border-radius: 6px; padding: 8px; box-shadow: 0 5px 20px rgba(0,0,0,0.8); display: none; width: 200px; height: auto; }
#popover-textarea { width: 100%; min-height: 40px; background: #111; color: #fff; border: 1px solid #444; padding: 8px; font-size: 12px; box-sizing: border-box; border-radius: 4px; display: block; line-height: 1.4; overflow: hidden; outline: none; word-break: break-all; }

.avatar-display { position: absolute; top: 0; left: 4px; width: 38px; height: 38px; z-index: 10; border-radius: 50%; overflow: hidden; border: 2px solid #fff; background: #333; display: flex; align-items: center; justify-content: center; }
.avatar-display img { width: 100%; height: 100%; object-fit: cover; }
.skill-circle-wrapper { width: 85px; height: 85px; margin: 0 auto; position: relative; border-radius: 50%; background: #262626; display: flex; justify-content: center; align-items: center; border: 3px solid #3d3d3d; overflow: hidden; cursor: pointer; }
.attribute-overlay { position: absolute; width: 100%; height: 100%; top: 0; left: 0; background-color: #00ABB5; z-index: 1; pointer-events: none; transition: background-color 0.3s; }
.shape-arc { clip-path: ellipse(100% 50% at 50% 100%); }
.shape-full { clip-path: none; }
.skill-icon { position: relative; z-index: 2; width: 70%; height: 70%; object-fit: contain; filter: brightness(100); }

.skill-text-icon { position: relative; z-index: 2; color: #fff; font-weight: bold; font-size: 18px; line-height: 85px; text-align: center; pointer-events: none; width: 100%; height: 100%; display: block; text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 0 0 4px rgba(0,0,0,0.8); }
.skill-text-icon.custom { pointer-events: auto; border: none; background: transparent; outline: none; width: 80px; height: 30px; line-height: 30px; white-space: nowrap; overflow: hidden; text-align: center; font-size: 16px; }

.skill-name-input { width: auto; min-width: 30px; max-width: 110px; background: transparent; border: none; color: var(--text-color); text-align: center; font-size: 0.9rem; margin-top: 4px; border-bottom: 1px solid var(--border-color); resize: none; overflow: hidden; display: inline-block; line-height: 1.2; padding: 0 2px; height: 1.2em; outline: none; word-break: break-all; }
.skill-controls { display: flex; justify-content: center; gap: 4px; margin-top: 4px;}
.ctrl-btn { background: #2a2a2a; border: 1px solid #444; color: #888; font-size: 10px; padding: 2px 6px; cursor: pointer; border-radius: 3px; }
.ctrl-btn:hover { background: #333; color: #ccc; }
.ctrl-btn.delete-btn:hover { background: #844; color: #fff; border-color: #f66; }
.ctrl-btn.insert-card-btn:hover { background: #266; color: #fff; border-color: var(--endfield-cyan); }

.arrow { font-size: 20px; color: #444; margin: 0; width: 25px; text-align: center; display: flex; align-items: center; justify-content: center; pointer-events: none; user-select: none; align-self: stretch; }

.btn-axis-op { background: #444; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-size: 0.85rem; transition: 0.2s; }
.btn-axis-op.btn-active { background-color: var(--endfield-cyan) !important; color: #000 !important; font-weight: bold; }

.btn-axis-save-prominent { border: 1px solid var(--endfield-cyan) !important; color: var(--endfield-cyan) !important; background: transparent !important; }
.btn-axis-view-prominent { border: 1px solid var(--endfield-gold) !important; color: var(--endfield-gold) !important; background: transparent !important; }

.axis-remark-area { margin-top: 20px; border-top: 1px solid var(--border-color); padding-top: 10px; }
.remark-header { display: flex; align-items: center; gap: 10px; cursor: pointer; color: #888; font-size: 0.9rem; width: fit-content; transition: color 0.2s; }
.remark-header:hover { color: var(--endfield-cyan); }
.remark-arrow-icon { width: 12px; height: 12px; flex-shrink: 0; fill: currentColor; transition: transform 0.3s; transform: rotate(180deg); display: block; margin-left: 2px; }
.remark-body { display: none; margin-top: 10px; }
.axis-remark-area.expanded .remark-body { display: block; }
.axis-remark-area.expanded .remark-arrow-icon { transform: rotate(0deg); }
.remark-input { background: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-color); width: 100%; min-height: 40px; padding: 10px; border-radius: 4px; resize: none; overflow: hidden; box-sizing: border-box; display: block; outline: none; }

#text-color-menu { position: fixed; display: none; z-index: 10000; background: #222; border: 1px solid #444; border-radius: 6px; padding: 5px; flex-direction: row; gap: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
.color-dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
.color-dot:hover { border-color: #fff; transform: scale(1.1); }

#modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:none; z-index: 2500; align-items:center; justify-content:center;}
#modal-overlay.active { display:flex; }
.modal-content { background: var(--card-bg); padding:20px; border-radius:8px; min-width:420px; max-height:80vh; overflow-y:auto; border: 1px solid var(--border-color); }

.modal-content.preview-mode { width: 95%; max-width: 1350px; position: relative; }
.preview-modal-header { position: sticky; top: -21px; z-index: 100; background: var(--card-bg); padding: 10px 0; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; margin-bottom: 15px; }

#preview-export-btn { display: inline-flex !important; background: var(--endfield-gold) !important; color: #000 !important; font-weight: bold; border: none; padding: 6px 15px; cursor: pointer; border-radius: 4px; }

.modal-content.preview-mode .axis-container { border: none; padding: 15px 0; border-bottom: 1px solid #333; }
.modal-content.preview-mode .axis-header { display: flex !important; margin-bottom: 10px; border-left: 4px solid var(--endfield-cyan); padding-left: 10px;}
.modal-content.preview-mode .axis-header button,
.modal-content.preview-mode .skill-controls,
.modal-content.preview-mode .insert-btn,
.modal-content.preview-mode .btn-axis-op,
.modal-content.preview-mode .skill-remark-icon,
.modal-content.preview-mode .skill-split-icon,
.modal-content.preview-mode .remark-arrow-icon { display: none !important; }
.modal-content.preview-mode .remark-header { display: flex !important; cursor: default !important; pointer-events: none; }
.modal-content.preview-mode .remark-body { display: block !important; }
.modal-content.preview-mode .skill-slot { width: 130px; margin-bottom: 0; }
.modal-content.preview-mode .skill-main-row { min-height: 250px; }
.modal-content.preview-mode .skill-note-preview.has-data { display: block !important; margin-top: -30px; }
.modal-content.preview-mode .skills-list { width: 1170px; margin: 0 auto; }

.save-manager { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; display: flex; flex-direction: column; gap: 10px; max-width: 800px; align-self: flex-start; }
.save-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 5px; }
.save-item { background: #2a2a2a; padding: 5px 12px; border-radius: 4px; display: flex; align-items: center; font-size: 13px; transition: 0.2s; border: 1px solid #444; }
.save-item span:first-child { cursor: pointer; white-space: nowrap; }
.save-item:hover { border-color: var(--endfield-cyan); }
.del-save { color: #f66; cursor: pointer; font-weight: bold; margin-left: 10px; font-size: 16px; line-height: 1; }
.modal-save-item-card { background:#2a2a2a; padding:12px; border-radius:4px; display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; border: 1px solid transparent; transition: 0.2s; }
.modal-save-item-card.active-save { border-color: var(--endfield-cyan); background: rgba(0, 229, 255, 0.05); }

.back-to-top { position: fixed; bottom: 30px; right: 30px; width: 45px; height: 45px; background: #111; border: 2px solid var(--endfield-cyan); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 2000; color: var(--endfield-cyan); font-size: 20px; font-weight: bold; box-shadow: 0 0 15px rgba(0,229,255,0.3); transition: 0.3s; }
.back-to-top:hover { background: var(--endfield-cyan); color: #000; }
.preview-all-btn { position: fixed; bottom: 85px; right: 30px; width: 45px; height: 45px; background: #111; border: 2px solid var(--endfield-gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 2000; color: var(--endfield-gold); transition: 0.3s; box-shadow: 0 0 15px rgba(222,167,1,0.2); }
.preview-all-btn:hover { background: var(--endfield-gold); color: #000; }

#char-sidebar { position: fixed; right: -320px; top: 0; width: var(--sidebar-width); height: 100%; background: var(--sidebar-bg); box-shadow: -10px 0 40px rgba(0,0,0,0.8); transition: 0.4s; z-index: 2000; display: flex; flex-direction: column; border-left: 3px solid var(--endfield-cyan); }
#char-sidebar.active { right: 0; pointer-events: auto; }
#char-sidebar:not(.active) { pointer-events: none; }

.sidebar-header-box { padding: 15px; background: rgba(0,0,0,0.1); border-bottom: 1px solid var(--border-color); }
.search-input { width: 100%; box-sizing: border-box; background: var(--input-bg); border: 1px solid #444; color: var(--text-color); padding: 8px 12px; border-radius: 4px; }
.char-list { flex: 1; overflow-y: auto; padding: 15px; }
.char-group { margin-bottom: 10px; overflow: hidden; }
.char-group.hidden { display: none !important; }
.char-main-item { display: flex; align-items: center; gap: 15px; padding: 10px 12px; cursor: pointer; border-radius: 8px; background: rgba(255,255,255,0.05); margin-bottom: 5px; border: 1px solid transparent; }
.char-main-item:hover { background: #333; }
.char-main-item.selected-tab { border-color: var(--endfield-cyan); background: rgba(0, 229, 255, 0.1); }
.char-main-item img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
.sidebar-arrow-icon { margin-left: auto; width: 12px; height: 12px; fill: #666; transition: transform 0.3s; transform: rotate(180deg); }
.char-group.expanded .sidebar-arrow-icon { transform: rotate(0deg); }
.skill-options-container { display: none; }
.char-group.expanded .skill-options-container { display: block; }
.skill-opt-item { padding: 8px 12px; background: rgba(255,255,255,0.05); border-radius: 4px; font-size: 13px; cursor: pointer; margin-top: 5px; transition: 0.2s; margin-left: 45px; }
.skill-opt-item:hover { background: #3d3d3d; color: #fff; }
.skill-opt-item.selected-skill { background: var(--endfield-cyan); color: black; font-weight: bold; }

#width-tester { position: absolute; visibility: hidden; white-space: pre-wrap; word-break: break-all; }
[contenteditable]:empty:before { content: attr(placeholder); color: #555; pointer-events: none; }

/* 文字变色菜单 */
#text-color-menu { position: fixed; display: none; z-index: 10000; background: #222; border: 1px solid #444; border-radius: 6px; padding: 5px; flex-direction: row; gap: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
</style>
</head>
<body oninput="if(event.target.closest('.axis-container')) latestModifiedAxisId = event.target.closest('.axis-container').id" onclick="if(event.target.closest('.axis-container')) latestModifiedAxisId = event.target.closest('.axis-container').id">
<div id="toc-container">
<div class="toc-header">快速跳转</div>
<div id="toc-list"></div>
</div>
<div id="width-tester"></div>
<div id="text-color-menu">
<div class="color-dot" style="background: #ffffff;" onmousedown="handleColorClick(event, '#ffffff')" title="默认白色"></div>
<div class="color-dot" style="background: #00E5FF;" onmousedown="handleColorClick(event, '#00E5FF')" title="终末青"></div>

<div class="container">
    <div class="header-bar">
        <div>
            <h1>明日方舟：终末地 排轴工具</h1>
            <div class="wiki-info">
                <p>本工具由Gamekee 终末地wiki组制作，未经许可禁止二次修改并发布</p>

function getFullUrl(path) {
    if(!path) return "";
    if(path.startsWith('http')) return path;
    let cleanPath = path.replace(/^blob\/main\//, "").replace(/^main\//, "");
    const parts = cleanPath.split('/');
    if (parts.length >= 2) {
        const user = parts[0];
        const repo = parts[1];
        const filePath = parts.slice(2).join('/');
        return `${GITHUB_CDN_BASE}${user}/${repo}@main/${filePath}`;
    }
    return GITHUB_CDN_BASE + cleanPath;
}

function compressShareData(data) {
    return data.map(ax => {
        const res = { t: ax.title };
        if (ax.remark) res.r = ax.remark;
        res.s = ax.slots.map(slot => ({
            c: slot.cards.map(c => {
                if (c.isCustom) return { x: c.iconText, o: c.color, m: c.skillRemark };
                const hIdx = orderedChars.indexOf(c.selectedChar);
                const kIdx = SKILL_TYPES.indexOf(c.selectedSkill);
                const card = { h: hIdx, k: kIdx };
                if (c.skillRemark) card.m = c.skillRemark;
                return card;
            })
        }));
        return res;
    });
}

function decompressShareData(data) {
    if (!Array.isArray(data)) return [];
    return data.map(ax => {
        const res = { title: ax.t, remark: ax.r || "", slots: [] };
        res.slots = ax.s.map(slot => ({
            cards: slot.c.map(c => {
                if (c.x) {
                    return { isCustom: true, iconText: c.x, color: c.o, skillRemark: c.m || "" };
                } else {
                    const charName = orderedChars[c.h];
                    const skillType = SKILL_TYPES[c.k];
                    const charRef = charData.find(cd => cd.name === charName);
                    const skillRef = charRef ? charRef.skills.find(s => s.type === skillType) : null;
                    return {
                        selectedChar: charName, selectedSkill: skillType, skillRemark: c.m || "",
                        avatar: charRef ? charRef.avatar : "", icon: skillRef ? skillRef.icon : "",
                        name: skillType, color: skillRef ? attrHex[skillRef.attr] : "",
                        isFull: skillType === '终结技', isCustom: false
                    };
                }
            })
        }));
        return res;
    });
}

let lastSelection = null;
function handleColorClick(e, color) {
    e.preventDefault();
    if (lastSelection) {
        const sel = window.getSelection();
        sel.removeAllRanges(); 
        sel.addRange(lastSelection);
        
        // 关键：在应用颜色前确保焦点在之前编辑的元素上
        if (lastSelection.startContainer.parentElement.closest('[contenteditable="true"]')) {
            lastSelection.startContainer.parentElement.closest('[contenteditable="true"]').focus();
        }

        document.execCommand('styleWithCSS', false, true);
        document.execCommand('foreColor', false, color);
        
        // 保持菜单显示，除非用户点击别处
        markDirty();
    }
}

// 快速跳转状态更新逻辑
function updateTOCActiveState() {
    const containers = document.querySelectorAll('#main-content > .axis-container');
    const tocItems = document.querySelectorAll('.toc-item');
    let currentId = "";

    containers.forEach(ax => {
        const axTop = ax.offsetTop;
        if (window.pageYOffset >= axTop - 100) {
            currentId = ax.id;
        }
    });

    tocItems.forEach(item => {
        item.classList.remove('active');
        if (item.dataset.axisId === currentId) {
            item.classList.add('active');
        }
    });
}

document.addEventListener('contextmenu', (e) => {
    const editable = e.target.closest('[contenteditable="true"]');
    if (editable) {
        e.preventDefault();
        const sel = window.getSelection();
        if (sel.rangeCount > 0) lastSelection = sel.getRangeAt(0).cloneRange();

        const menu = document.getElementById('text-color-menu');
        menu.style.display = 'flex';
        menu.style.top = `${e.clientY}px`;
        menu.style.left = `${e.clientX}px`;
    } else {
        document.getElementById('text-color-menu').style.display = 'none';
    }
});

function updateTOC() {
    const list = document.getElementById('toc-list');
    const containers = document.querySelectorAll('#main-content > .axis-container');
    list.innerHTML = "";
    containers.forEach(ax => {
        const titleInput = ax.querySelector('.axis-title');
        const title = titleInput.innerText || "未命名轴";
        const item = document.createElement('div');
        item.className = "toc-item"; 
        item.innerText = title;
        item.dataset.axisId = ax.id; // 绑定ID用于高亮检测
        item.onclick = () => {
            window.scrollTo({ top: ax.offsetTop - 20, behavior: 'smooth' });
            ax.style.boxShadow = "0 0 20px var(--endfield-cyan)";
            ax.style.transition = "box-shadow 0.3s";
            setTimeout(() => { ax.style.boxShadow = "0 10px 30px rgba(0,0,0,0.8)"; }, 1500);
        };
        list.appendChild(item);
    });
    updateTOCActiveState();
}

    return Array.from(document.querySelectorAll('#main-content > .axis-container')).map(ax => ({
        title: ax.querySelector('.axis-title').innerHTML,
        remark: ax.querySelector('.remark-input').innerHTML,
        slots: Array.from(ax.querySelectorAll('.skill-slot')).map(slot => ({
            cards: Array.from(slot.querySelectorAll('.skill-card')).map(c => ({
                avatar: c.querySelector('.target-avatar').src,
                icon: c.querySelector('.skill-icon')?.src || "",
                iconText: c.querySelector('.skill-text-icon')?.innerHTML || "",
                isCustom: !!c.querySelector('.skill-text-icon.custom'),

                selectedChar: c.dataset.selectedChar || "",
                selectedSkill: c.dataset.selectedSkill || "",
                skillRemark: c.dataset.skillRemark || ""
            }))
        }))
    }));
}

function exportShareCode() {
    const data = getFullData(); if (data.length === 0) return alert('没有数据');
    const saveName = document.getElementById('save-name').value.trim() || "分享存档";
    const shareObj = { n: saveName, d: compressShareData(data) };
    const code = btoa(encodeURIComponent(JSON.stringify(shareObj)));
    navigator.clipboard.writeText(code).then(() => alert('分享码已复制到剪贴板！')).catch(() => prompt("复制分享码：", code));
}

function importShareCode() {
    const code = prompt("请输入分享码："); if (!code) return;
    try {
        const decoded = JSON.parse(decodeURIComponent(atob(code)));
        let axesData = []; let archiveName = "";
        if (decoded.d) { axesData = decompressShareData(decoded.d); archiveName = decoded.n; }
        else { axesData = Array.isArray(decoded) ? decoded : (decoded.data || []); archiveName = decoded.name || ""; }
        renderFromData(axesData);
        if (archiveName) document.getElementById('save-name').value = archiveName;
        alert('导入成功！'); markDirty();
    } catch(e) { alert('无效的分享码'); }
}

    const avatarBox = currentTargetCard.querySelector('.avatar-display'); avatarBox.style.display = "flex";
    const qMark = avatarBox.querySelector('.avatar-placeholder'); if(qMark) qMark.style.display = 'none';
    const img = avatarBox.querySelector('.target-avatar'); img.src = avatarUrl; img.style.display = 'block';
    const wrap = currentTargetCard.querySelector('.skill-circle-wrapper');
    if (skillType === "重击") { wrap.innerHTML = `<div class="attribute-overlay shape-arc" style="background-color:${attrHex[attrType]}"></div><div class="skill-text-icon">重击</div>`; }
    else { wrap.innerHTML = `<div class="attribute-overlay ${skillType==='终结技'?'shape-full':'shape-arc'}" style="background-color:${attrHex[attrType]}"></div><img crossOrigin="anonymous" class="skill-icon" src="${iconUrl}">`; }
    const tx = currentTargetCard.querySelector('.skill-name-input'); tx.innerHTML = `${skillType}`; resizeSkillName(tx);
    updateLocalPreview(currentTargetCard.closest('.skill-slot'));
}
function updatePopoverPos() {
    if(!activeRemarkIcon) return; const rect = activeRemarkIcon.getBoundingClientRect(); const pop = document.getElementById('skill-note-popover');
    if(rect.top < 0 || rect.bottom > window.innerHeight) { pop.style.display = 'none'; activeRemarkIcon = null; }
    else { pop.style.top = (rect.top + 25) + 'px'; pop.style.left = (rect.left - 180) + 'px'; }
}
function initBackground() {
    const validBgs = bgAssets.filter(url => url && url.trim() !== "");
    if (validBgs.length === 0) return;
    const randomBg = validBgs[Math.floor(Math.random() * validBgs.length)];
    const fullUrl = getFullUrl(randomBg);
    document.body.style.backgroundImage = `url('${fullUrl}')`;
}

// 绑定滚动事件用于更新目录选中状态
window.addEventListener('scroll', () => {
    updateTOCActiveState();
    updatePopoverPos();
});

document.addEventListener('click', e => {
    if(!e.target.closest('#char-sidebar') && !e.target.closest('.skill-card')) closeSidebar();
    const p = document.getElementById('text-color-menu');
    if(p.style.display === 'flex' && !e.target.closest('#text-color-menu')) { p.style.display = 'none'; }
    const notePop = document.getElementById('skill-note-popover');
    if(notePop.style.display === 'block' && !e.target.closest('#skill-note-popover') && !e.target.closest('.skill-remark-icon')) { notePop.style.display = 'none'; activeRemarkIcon = null; }
});

initSidebar(); renderRecent(); addAxis(); initBackground();
</script>
</body>
</html>
